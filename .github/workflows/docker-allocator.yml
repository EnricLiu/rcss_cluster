name: Build & Push allocator Image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "allocator/**"
      - "common/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-allocator.yml"
  pull_request:
    branches: [main]
    paths:
      - "allocator/**"
      - "common/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-allocator.yml"
  workflow_dispatch:

env:
  REGISTRY: registry.cn-beijing.aliyuncs.com
  IMAGE_NAME: nexus-prime/rcss-allocator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Alibaba Cloud Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./allocator/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  retag-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REGISTRY_PASSWORD }}

      - name: Extract source image tag
        id: source-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha

      - name: Extract release image tags
        id: release-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Wait for source image
        env:
          SOURCE_IMAGE: ${{ steps.source-meta.outputs.tags }}
        run: |
          for _ in 1 2 3 4 5; do
            if docker buildx imagetools inspect "$SOURCE_IMAGE" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 30
          done
          if docker buildx imagetools inspect "$SOURCE_IMAGE" >/dev/null 2>&1; then
            exit 0
          fi
          echo "Source image not found: $SOURCE_IMAGE" >&2
          exit 1

      - name: Retag release image
        env:
          SOURCE_IMAGE: ${{ steps.source-meta.outputs.tags }}
          RELEASE_TAGS: ${{ steps.release-meta.outputs.tags }}
        run: |
          tags=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tags+=(-t "$tag")
          done <<< "$RELEASE_TAGS"
          docker buildx imagetools create "${tags[@]}" "$SOURCE_IMAGE"
