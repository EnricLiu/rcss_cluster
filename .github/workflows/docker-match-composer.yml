name: Build & Push match_composer Image

on:
  push:
    branches: [main, nightly]
    tags: ["v*"]
    paths:
      - "match_composer/src/**"
      - "match_composer/Cargo.toml"
      - "match_composer/Dockerfile"
      - "common/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-match-composer.yml"
  pull_request:
    branches: [main, nightly]
    paths:
      - "match_composer/src/**"
      - "match_composer/Cargo.toml"
      - "match_composer/Dockerfile"
      - "common/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-match-composer.yml"
  # Rebuild when hub base image is updated
  workflow_run:
    workflows: ["Build & Push mc-hub Base Image"]
    types: [completed]
    branches: [main, nightly]
  workflow_dispatch:

env:
  REGISTRY: registry.cn-beijing.aliyuncs.com
  IMAGE_NAME: nexus-prime/rcss-match-composer
  HUB_IMAGE_REPOSITORY: registry.cn-beijing.aliyuncs.com/nexus-prime/rcss-mc-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed hub build
    if: >-
      (github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')) &&
      (github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read

    steps:
      - name: Resolve source context
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HUB_IMAGE_REPOSITORY}" ]; then
            echo "HUB_IMAGE_REPOSITORY is empty" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            checkout_ref="${{ github.event.workflow_run.head_sha }}"
            source_sha="${{ github.event.workflow_run.head_sha }}"
            source_branch="${{ github.event.workflow_run.head_branch }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            checkout_ref="${{ github.event.pull_request.head.sha }}"
            source_sha="${{ github.event.pull_request.head.sha }}"
            source_branch="${{ github.event.pull_request.head.ref }}"
          else
            checkout_ref="${{ github.sha }}"
            source_sha="${{ github.sha }}"
            source_branch="${{ github.ref_name }}"
          fi

          short_sha="$(printf '%s' "$source_sha" | cut -c1-7)"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            hub_tag="sha-$short_sha"
          elif [ "$source_branch" = "main" ] || [ "$source_branch" = "nightly" ]; then
            hub_tag="$source_branch"
          else
            hub_tag="latest"
          fi

          hub_image="${HUB_IMAGE_REPOSITORY}:$hub_tag"

          if [ -z "$hub_image" ]; then
            echo "Resolved hub_image is empty" >&2
            exit 1
          fi

          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "source_branch=$source_branch" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "hub_image=$hub_image" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Alibaba Cloud Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REGISTRY_PASSWORD }}

      - name: Wait for hub base image
        if: github.event_name == 'workflow_run'
        env:
          HUB_IMAGE: ${{ steps.context.outputs.hub_image }}
        run: |
          for _ in 1 2 3 4 5; do
            if docker buildx imagetools inspect "$HUB_IMAGE" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 30
          done
          if docker buildx imagetools inspect "$HUB_IMAGE" >/dev/null 2>&1; then
            exit 0
          fi
          echo "Hub image not found: $HUB_IMAGE" >&2
          exit 1

      - name: Validate resolved hub image
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ steps.context.outputs.hub_image }}"
          echo "Using HUB_IMAGE=${{ steps.context.outputs.hub_image }}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.context.outputs.source_branch }},enable=${{ steps.context.outputs.source_branch == 'main' || steps.context.outputs.source_branch == 'nightly' }}
            type=raw,value=sha-${{ steps.context.outputs.short_sha }}
            type=raw,value=nightly-${{ steps.context.outputs.short_sha }},enable=${{ steps.context.outputs.source_branch == 'nightly' }}
          labels: |
            org.opencontainers.image.revision=${{ steps.context.outputs.source_sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./match_composer/Dockerfile
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            HUB_IMAGE=${{ steps.context.outputs.hub_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  retag-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REGISTRY_PASSWORD }}

      - name: Extract source image tag
        id: source-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha

      - name: Extract release image tags
        id: release-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Wait for source image
        env:
          SOURCE_IMAGE: ${{ steps.source-meta.outputs.tags }}
        run: |
          for _ in 1 2 3 4 5; do
            if docker buildx imagetools inspect "$SOURCE_IMAGE" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 30
          done
          if docker buildx imagetools inspect "$SOURCE_IMAGE" >/dev/null 2>&1; then
            exit 0
          fi
          echo "Source image not found: $SOURCE_IMAGE" >&2
          exit 1

      - name: Retag release image
        env:
          SOURCE_IMAGE: ${{ steps.source-meta.outputs.tags }}
          RELEASE_TAGS: ${{ steps.release-meta.outputs.tags }}
        run: |
          tags=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tags+=(-t "$tag")
          done <<< "$RELEASE_TAGS"
          docker buildx imagetools create "${tags[@]}" "$SOURCE_IMAGE"
