apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcss-env-allocator
  namespace: rcss-gateway-dev
  labels:
    app: rcss-env-allocator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rcss-env-allocator
  template:
    metadata:
      labels:
        app: rcss-env-allocator
    spec:
      serviceAccountName: rcss-env-allocator-sa
      containers:
        - name: rcss-env-allocator
          image: registry-vpc.cn-beijing.aliyuncs.com/nexus-prime/rcss-allocator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5555
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "debug"
            - name: AGONES_FLEET_NAMESPACE
              value: "rcss-env-dev"
            - name: ALLOCATOR_HOST
              value: "0.0.0.0"
            - name: ALLOCATOR_HTTP_PORT
              value: "5555"
#            - name: ALLOCATOR_AUTH_TOKEN
#              valueFrom:
#                secretKeyRef:
#                  name: xxx
#                  key: xxx
#            - name: AGONES_GSA_SCHEDULE_STRATEGY
#              value: "Packed"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
