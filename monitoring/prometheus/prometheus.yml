global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "rcss-cluster"
    environment: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "rcss-server"
    static_configs:
      - targets: ["host.docker.internal:55555"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
