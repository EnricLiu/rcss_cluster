apiVersion: agones.dev/v1
kind: Fleet
metadata:
  name: rcss-env-fleet-template-v260424003
spec:
  replicas: 2
  scheduling: Packed
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  allocationOverflow:
    labels:
      version: ""
    annotations:
      overflow: "true"

  priorities:
    - type: Counter
      key: rooms
      order: Descending
    - type: List
      key: players
      order: Ascending

  template:
    spec:
      container: rcss-cluster
      ports:
        - name: default
          portPolicy: Dynamic
          containerPort: 6666
          protocol: TCP

        - name: player
          portPolicy: Dynamic
          containerPort: 6657
          protocol: UDP
        - name: trainer
          portPolicy: Dynamic
          containerPort: 6658
          protocol: UDP
        - name: coach
          portPolicy: Dynamic
          containerPort: 6659
          protocol: UDP

        - name: player-raw
          portPolicy: Dynamic
          containerPort: 6000
          protocol: UDP
        - name: trainer-raw
          portPolicy: Dynamic
          containerPort: 6001
          protocol: UDP
        - name: coach-raw
          portPolicy: Dynamic
          containerPort: 6002
          protocol: UDP

        - name: mc
          portPolicy: Dynamic
          containerPort: 7777
          protocol: TCP

      health:
        disabled: false
        initialDelaySeconds: 30
        periodSeconds: 30
        failureThreshold: 3

      sdkServer:
        logLevel: Info
        grpcPort: 9357
        httpPort: 9358

      counters:
        rooms:
          count: 0
          capacity: 100

      lists:
        players:
          values: []

      template:
        spec:
          volumes:
            - name: oss-env-dev
              persistentVolumeClaim:
                claimName: oss-nexus-prime-env-dev
            - name: runtime-shared
              emptyDir: {}
          initContainers:
            - name: init-log-root
              image: registry-vpc.cn-beijing.aliyuncs.com/nexus-prime/busybox:1.36
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -ceu
                - |
                  ts="$(date +%Y%m%d-%H%M%S)"
                  root="${LOG_ROOT}/${ts}-${POD_NAME}"
                  mkdir -p "$root/players" "$(dirname "$RCSS_LOG_ROOT_FILE")"
                  printf '%s\n' "$root" > "$RCSS_LOG_ROOT_FILE"
              env:
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: LOG_ROOT
                  value: "/mnt/logs"
                - name: RCSS_LOG_ROOT_FILE
                  value: "/var/run/rcss/log-root"
              volumeMounts:
                - name: oss-env-dev
                  mountPath: /mnt/logs
                - name: runtime-shared
                  mountPath: /var/run/rcss
          containers:
            - name: rcss-cluster
              image: registry-vpc.cn-beijing.aliyuncs.com/nexus-prime/rcss-cluster:nightly
              imagePullPolicy: Always
              volumeMounts:
                - name: oss-env-dev
                  mountPath: /mnt/logs
                - name: runtime-shared
                  mountPath: /var/run/rcss
              resources:
                requests:
                  memory: 192Mi
                  cpu: 200m
                limits:
                  memory: 256Mi
                  cpu: 500m
              env:
                - name: RUST_LOG
                  value: "debug"
                - name: LOGGER_ROOT_FILE
                  value: "/var/run/rcss/log-root"

                - name: SERVER_HOST
                  value: "0.0.0.0"
                - name: SERVER_HTTP_PORT
                  value: "6666"
                - name: SERVER_STDIO_PATH # rel to the path in LOGGER_ROOT_FILE
                  value: "./server.log"

                - name: SERVER_UDP_PORT_PLAYER
                  value: "6657"
                - name: SERVER_UDP_PORT_TRAINER
                  value: "6658"
                - name: SERVER_UDP_PORT_COACH
                  value: "6659"

                - name: AGONES_GRPC_PORT
                  value: "9357"
                - name: AGONES_KEEP_ALIVE_S
                  value: "30"
                - name: AGONES_HEALTH_INTERVAL_S
                  value: "5"

                - name: RCSSSERVER_PLAYER_UDP
                  value: "6000"
                - name: RCSSSERVER_TRAINER_UDP
                  value: "6001"
                - name: RCSSSERVER_COACH_UDP
                  value: "6002"
                - name: RCSSSERVER_SYNC_MODE_EN
                  value: "true"
                - name: RCSSSERVER_MAX_TIMESTEP
                  value: "6000"
                - name: RCSSSERVER_LOG_DIR  # rel to the path in LOGGER_ROOT_FILE
                  value: "./games"

                - name: TRAINER_HALF_TIME_AUTO_START_EN
                  value: "true"
                - name: CONTAINER_AUTO_SHUTDOWN_ON_FINISH_EN
                  value: "false"
#                - name: LOGGER_STDOUT_ALWAYS_EN
#                  value: "true"

                - name: MATCH_COMPOSER_EN
                  value: "true"
                - name: MATCH_COMPOSER_HOST
                  value: "127.0.0.1"
                - name: MATCH_COMPOSER_PORT
                  value: "7777"
                - name: MATCH_COMPOSER_STATUS_POLL_INTERVAL_MS
                  value: "2000"
                - name: MATCH_COMPOSER_CLIENT_CONNECT_TIMEOUT_MS
                  value: "5000"
                - name: MATCH_COMPOSER_CLIENT_REQUEST_TIMEOUT_MS
                  value: "60000"
#                - name: MATCH_COMPOSER_CLIENT_RETRY_BACKOFF_EN
#                  value: "true"
                - name: MATCH_COMPOSER_CLIENT_MAX_RETRIES
                  value: "30"
                - name: MATCH_COMPOSER_CLIENT_RETRY_DELAY_MS
                  value: "2000"

            - name: match-composer
              image: registry-vpc.cn-beijing.aliyuncs.com/nexus-prime/rcss-match-composer:nightly
              imagePullPolicy: Always
              volumeMounts:
                - name: oss-env-dev
                  mountPath: /mnt/logs
                - name: runtime-shared
                  mountPath: /var/run/rcss
              resources:
                requests:
                  memory: 256Mi
                  cpu: 300m
                limits:
                  memory: 512Mi
                  cpu: 1000m
              env:
                - name: RUST_LOG
                  value: "debug"
                - name: LOGGER_ROOT_FILE
                  value: "/var/run/rcss/log-root"

                - name: MC_HOST
                  value: "0.0.0.0"
                - name: MC_PORT
                  value: "7777"
                - name: SERVER_HOST
                  value: "127.0.0.1"
                - name: SERVER_PORT
                  value: "6666"

                - name: SERVER_UDP_PORT_PLAYER
                  value: "6657"
                - name: SERVER_UDP_PORT_TRAINER
                  value: "6658"
                - name: SERVER_UDP_PORT_COACH
                  value: "6659"

                - name: MC_HUB_PATH
                  value: "./hub"
                - name: MC_PLAYER_LOG_ROOT # rel to the path in LOGGER_ROOT_FILE
                  value: "./players"
                - name: MC_STDIO_LOG_PATH # rel to the path in LOGGER_ROOT_FILE
                  value: "./mc.log"

#                - name: MC_TEAM_SPAWN_CONCURRENT_EN
#                  value: "true"
                - name: MC_PLAYER_SPAWN_DELAY
                  value: "500"
                - name: MC_TEAM_SPAWN_DELAY
                  value: "1000"

                - name: MC_AGONES_EN
                  value: "true"
                - name: AGONES_GRPC_PORT
                  value: "9357"
                - name: AGONES_KEEP_ALIVE_S
                  value: "30"
#                - name: MC_CONFIG_FILE should not set in Agones mode
#                  value: "0.0.0.0"

            - name: rcss-probe
              image: registry-vpc.cn-beijing.aliyuncs.com/nexus-prime/rcss-probe:latest
              volumeMounts:
                - name: oss-env-dev
                  mountPath: /mnt
                - name: runtime-shared
                  mountPath: /var/run/rcss
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              env:
                - name: LOGGER_ROOT_FILE
                  value: "/var/run/rcss/log-root"